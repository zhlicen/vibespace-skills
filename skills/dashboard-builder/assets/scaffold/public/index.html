<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="appTitle">Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="./tokens.css">
<script src="./i18n.js"></script>
<style>
  header.appbar { position:sticky; top:0; z-index:40; background:var(--header-bg);
    backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border); }
  .row1 { max-width:1320px; margin:0 auto; padding:0 28px; height:60px; display:flex; align-items:center; gap:14px; }
  .spacer { flex:1; }
  .iconbtn { width:38px; height:38px; border:none; background:var(--ctrl-bg); border-radius:var(--radius-ctrl);
    box-shadow:var(--ctrl-shadow); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:600; color:var(--text); }
  main { max-width:1320px; margin:0 auto; padding:24px 28px 80px; }
  .kpiRow { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:20px; }
  .kpi-label { font-size:12.5px; color:var(--sub); font-weight:500; }
  .kpi-value { font-size:30px; font-weight:700; letter-spacing:-1px; color:var(--text); margin-top:6px; }
  .chartRow { display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:20px; margin-bottom:20px; }
  .ctitle { font-size:14px; font-weight:600; margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; text-align:left; padding:9px 14px; }
  td { padding:11px 14px; }
  tbody tr { border-bottom:1px solid var(--divider); }
  #stateMsg { padding:60px 0; text-align:center; color:var(--muted); font-size:15px; }
</style>
</head>
<body>
  <header class="appbar">
    <div class="row1">
      <strong data-i18n="appTitle">Dashboard</strong>
      <span id="asOf" style="font-size:12px;color:var(--muted);"></span>
      <span class="spacer"></span>
      <button id="darkToggle" class="iconbtn" data-i18n-title="hdr.dark">🌙</button>
      <button id="langToggle" class="iconbtn" data-i18n-title="hdr.lang">中</button>
    </div>
  </header>
  <main>
    <div id="stateMsg" data-i18n="common.loading">Loading…</div>
    <div id="content" style="display:none;">
      <div class="kpiRow" id="kpiRow"></div>
      <div class="chartRow" id="charts"></div>
      <div id="tables"></div>
    </div>
  </main>
  <script src="./app.js"></script>
</body>
</html>
